
<div class="stock-graph-container glass-bg-no-white">
    <form class="options" [formGroup]="graphForm">
        <div class="option period">
            <div class="select-container">
                <select formControlName="interval">
                    <option value="" selected disabled>Choose an interval...</option>
                    <option *ngFor="let interval of intervals" [value]="interval.value">{{interval.placeholder}}</option>
                </select>
            </div>
        </div>
        <div class="option interval">
            <div class="select-container">
                <select formControlName="period">
                    <option value="" selected disabled>Choose an period...</option>
                    <option *ngFor="let period of periods" [value]="period.value">{{period.placeholder}}</option>
                </select>
            </div>
        </div>
        <div class="option submit" (click)="reloadGraph()">
            <div class="submit-button">
                Submit
            </div>
        </div>
    </form>
    <div
        echarts
        [options]="chartOption"
        class="chart"
        *ngIf="!loadingGraph">
    </div>
    <div class="loader-graph" *ngIf="loadingGraph">
        <mat-spinner diameter="40"></mat-spinner>
    </div>
</div>
